<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>GeoTerrain Map Picker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>
    <style>
        html, body, #map { margin:0; padding:0; width:100%; height:100%; background:#0a1220; }

        #coords {
            position:absolute; bottom:10px; left:10px;
            background:rgba(0,0,0,0.75); color:#8cf;
            padding:6px 10px; border-radius:6px;
            font-family:monospace; font-size:12px;
            z-index:9999; max-width:340px;
            pointer-events:none;
        }

        #sendBtn {
            position:absolute; bottom:10px; right:10px;
            background:#2563eb; color:#fff; border:none;
            padding:8px 16px; border-radius:6px;
            cursor:pointer; display:none; z-index:9999;
            font-size:13px; font-weight:600;
        }
        #sendBtn:hover { background:#1d4ed8; }

        #clearBtn {
            position:absolute; bottom:10px; right:120px;
            background:#6b1d1d; color:#fff; border:none;
            padding:8px 16px; border-radius:6px;
            cursor:pointer; display:none; z-index:9999;
            font-size:13px;
        }
        #clearBtn:hover { background:#991b1b; }
    </style>
</head>
<body>
<div id="map"></div>
<div id="coords">Draw a rectangle or polygon to select an area</div>
<button id="clearBtn" onclick="clearSelection()">Clear</button>
<button id="sendBtn" onclick="sendArea()">Use This Area</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
<script>
    const map = L.map('map', { zoomControl: true }).setView([20, 0], 2);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom: 18
    }).addTo(map);

    const drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);

    const drawControl = new L.Control.Draw({
        draw: {
            rectangle: { shapeOptions: { color:'#2563eb', weight:2 } },
            polygon:   { shapeOptions: { color:'#2563eb', weight:2 } },
            circle: false, marker: false, polyline: false, circlemarker: false
        },
        edit: { featureGroup: drawnItems }
    });
    map.addControl(drawControl);

    let currentBounds = null;

    map.on(L.Draw.Event.CREATED, function(e) {
        drawnItems.clearLayers();
        drawnItems.addLayer(e.layer);

        const b = e.layer.getBounds();
        currentBounds = {
            west:  parseFloat(b.getWest().toFixed(6)),
            south: parseFloat(b.getSouth().toFixed(6)),
            east:  parseFloat(b.getEast().toFixed(6)),
            north: parseFloat(b.getNorth().toFixed(6))
        };

        document.getElementById('coords').innerText =
            'W ' + currentBounds.west + '   S ' + currentBounds.south +
            '\nE ' + currentBounds.east + '   N ' + currentBounds.north;

        document.getElementById('sendBtn').style.display  = 'block';
        document.getElementById('clearBtn').style.display = 'block';
    });

    function clearSelection() {
        drawnItems.clearLayers();
        currentBounds = null;
        document.getElementById('coords').innerText = 'Draw a rectangle or polygon to select an area';
        document.getElementById('sendBtn').style.display  = 'none';
        document.getElementById('clearBtn').style.display = 'none';
    }

    function sendArea() {
        if (!currentBounds) return;
        const msg = JSON.stringify(currentBounds);

        // UE5 SWebBrowser JS binding: window.ue.geoterrainhandler.onboundsselected(msg)
        if (window.ue && window.ue.geoterrainhandler && window.ue.geoterrainhandler.onboundsselected) {
            window.ue.geoterrainhandler.onboundsselected(msg);
        } else {
            // Fallback: log for debugging outside UE
            console.log('GeoTerrain bounds:', msg);
            alert('Bounds: ' + msg);
        }
    }
</script>
</body>
</html>
